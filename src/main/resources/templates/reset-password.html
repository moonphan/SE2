<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset password</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 680px; margin: 24px auto;">
<h2>Reset password</h2>
<p><a href="/auth/login">Back to login</a></p>

<p th:if="${errorMessage}" th:text="${errorMessage}" style="color: red;"></p>

<p>Use the link from your email to open this page. Enter your new password below.</p>

<form method="post" action="/auth/reset-password" th:object="${resetPasswordForm}">
    <input type="hidden" th:field="*{token}">
    <label>New password</label><br>
    <input type="password" th:field="*{newPassword}" required style="width: 100%; margin-bottom: 8px;">
    <label>Confirm password</label><br>
    <input type="password" th:field="*{confirmPassword}" required style="width: 100%; margin-bottom: 12px;">
    <button type="submit">Reset password</button>
</form>
</body>
</html>
