<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 680px; margin: 24px auto;">
<h2>Forgot Password</h2>
<p><a href="/auth/login">Back to Login</a></p>

<p th:if="${successMessage}" th:text="${successMessage}" style="color: green;"></p>
<p th:if="${errorMessage}" th:text="${errorMessage}" style="color: red;"></p>

<form method="post" action="/auth/forgot-password" th:object="${forgotPasswordForm}">
    <label>Email</label><br>
    <input type="email" th:field="*{email}" required style="width: 100%; margin-bottom: 12px;">
    <button type="submit">Send Reset Link</button>
</form>
</body>
</html>
