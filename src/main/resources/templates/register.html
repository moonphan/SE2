<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 680px; margin: 24px auto;">
<h2>Register</h2>
<p><a href="/auth/login">Go to Login</a></p>

<p th:if="${successMessage}" th:text="${successMessage}" style="color: green;"></p>
<p th:if="${errorMessage}" th:text="${errorMessage}" style="color: red;"></p>

<form method="post" action="/auth/register" th:object="${registerForm}">
    <div style="margin-bottom: 8px;">
        <label>Full Name</label><br>
        <input type="text" th:field="*{fullName}" required style="width: 100%;">
    </div>

    <div style="margin-bottom: 8px;">
        <label>Username</label><br>
        <input type="text" th:field="*{username}" required style="width: 100%;">
    </div>

    <div style="margin-bottom: 8px;">
        <label>Email</label><br>
        <input type="email" th:field="*{email}" required style="width: 100%;">
    </div>

    <div style="margin-bottom: 8px;">
        <label>Password</label><br>
        <input type="password" th:field="*{password}" required style="width: 100%;">
    </div>

    <div style="margin-bottom: 8px;">
        <label>Confirm Password</label><br>
        <input type="password" th:field="*{confirmPassword}" required style="width: 100%;">
    </div>

    <div style="margin-bottom: 8px;">
        <label>Phone Number</label><br>
        <input type="text" th:field="*{phoneNumber}" required style="width: 100%;">
    </div>

    <div style="margin-bottom: 12px;">
        <label>Address</label><br>
        <input type="text" th:field="*{address}" style="width: 100%;">
    </div>

    <button type="submit">Register</button>
</form>
</body>
</html>
