<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Sellers</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 980px; margin: 24px auto;">
<h2 th:text="${selectedSubCategory != null ? 'Best Sellers - ' + selectedSubCategory.name : 'Best Sellers'}"></h2>

<p>
    <a href="/products">All Products</a> |
    <a href="/sub-categories">SubCategories</a>
</p>

<div style="margin-bottom: 14px; border: 1px solid #eee; padding: 10px;">
    <strong>SubCategories:</strong>
    <a th:each="sc : ${subCategories}"
       th:href="@{|/sub-categories/${sc.id}/best-sellers|}"
       th:text="${sc.name}"
       style="margin-right: 12px; display: inline-block;"></a>
</div>

<table border="1" cellpadding="8" cellspacing="0" style="width: 100%; border-collapse: collapse;">
    <thead>
    <tr>
        <th>Name</th>
        <th>Brand</th>
        <th>Total Sold</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="p : ${bestSellers}">
        <td th:text="${p.name}"></td>
        <td th:text="${p.brand}"></td>
        <td th:text="${p.totalSold}"></td>
        <td><a th:href="@{|/product-detail/${p.id}|}">View</a></td>
    </tr>
    </tbody>
</table>
</body>
</html>
