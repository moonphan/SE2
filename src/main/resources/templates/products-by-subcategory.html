<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products by SubCategory</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 980px; margin: 24px auto;">
<h2 th:text="${selectedSubCategory != null ? selectedSubCategory.name : 'SubCategory Products'}"></h2>

<p>
    <a href="/products">All Products</a> |
    <a href="/sub-categories">SubCategories</a> |
    <a href="/recently-viewed">Recently Viewed</a>
</p>

<div style="margin-bottom: 14px; border: 1px solid #eee; padding: 10px;">
    <strong>SubCategories:</strong>
    <a th:each="sc : ${subCategories}"
       th:href="@{|/sub-categories/${sc.id}/products|}"
       th:text="${sc.name}"
       style="margin-right: 12px; display: inline-block;"></a>
</div>

<div>
    <p th:if="${productPage.totalElements == 0}" style="color: #666;">No products found.</p>
    <div th:if="${productPage.totalElements > 0}">
        <p>
            Total: <strong th:text="${productPage.totalElements}"></strong> products
        </p>
        <table border="1" cellpadding="8" cellspacing="0" style="width: 100%; border-collapse: collapse;">
            <thead>
            <tr>
                <th>Name</th>
                <th>Brand</th>
                <th>Category</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${products}">
                <td th:text="${p.name}"></td>
                <td th:text="${p.brand}"></td>
                <td th:text="${p.category.name}"></td>
                <td th:text="${p.unitPrice}"></td>
                <td th:text="${p.stockQuantity}"></td>
                <td><a th:href="@{|/product-detail/${p.id}|}">View</a></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
