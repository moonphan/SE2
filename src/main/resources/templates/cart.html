<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 920px; margin: 24px auto;">
<h2>View & Update Cart</h2>

<p>
    <a href="/products">Products</a>
    <span style="margin-left: 12px;">
        <a href="/auth/profile">Profile</a>
    </span>
</p>

<p th:if="${successMessage}" th:text="${successMessage}" style="color: green;"></p>
<p th:if="${errorMessage}" th:text="${errorMessage}" style="color: red;"></p>

<form method="post" action="/cart" th:if="${cartView.items != null}">
    <table border="1" cellpadding="8" cellspacing="0" style="width: 100%; border-collapse: collapse;">
        <thead>
        <tr>
            <th>Product</th>
            <th>Stock Now</th>
            <th>Unit Price</th>
            <th>Quantity</th>
            <th>Line Total</th>
            <th>Remove</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${cartView.items}">
            <td>
                <div th:text="${item.name}"></div>
                <div style="color:#666;" th:text="${item.brand}"></div>
                <input type="hidden" name="productIds" th:value="${item.productId}">
                <div th:if="${item.outOfStock}" style="color:red;">Out of stock</div>
            </td>
            <td th:text="${item.stockQuantityNow}"></td>
            <td th:text="${item.unitPriceNow}"></td>
            <td>
                <input type="number"
                       name="quantities"
                       min="0"
                       th:value="${item.quantity}"
                       th:readonly="${item.outOfStock}">
            </td>
            <td th:text="${item.lineTotal}"></td>
            <td>
                <button type="submit"
                        formaction="/cart/items/remove"
                        formmethod="post"
                        name="productId"
                        th:value="${item.productId}">
                    Remove
                </button>
            </td>
        </tr>
        </tbody>
    </table>

    <div style="margin-top: 14px;">
        <strong>Total: </strong>
        <span th:text="${cartView.totalPrice}"></span>
    </div>

    <div style="margin-top: 14px;">
        <button type="submit" th:disabled="${!cartView.canProceedToCheckout}">
            Update Cart
        </button>
    </div>
</form>

<div style="margin-top: 14px;">
    <button disabled th:if="${!cartView.canProceedToCheckout}">Proceed to Checkout (disabled - out of stock)</button>
    <a th:if="${cartView.canProceedToCheckout}" href="/checkout">Proceed to Checkout</a>
</div>

</body>
</html>
