<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request warranty</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 560px; margin: 24px auto;">
<h2>Request warranty</h2>
<p><a th:href="@{|/warranties/${warranty.id}|}">Back to warranty details</a></p>

<!-- Expired branch (activity diagram): show error only -->
<div th:if="${expired}" style="border: 1px solid #c00; padding: 12px; background: #fff5f5;">
    <p><strong>Error:</strong> This warranty has expired. You cannot submit a warranty request.</p>
</div>

<!-- Valid: show form (after expiry check) -->
<div th:if="${!expired and ticketForm != null}">
    <p th:if="${ticketError}" style="color: #c00;" th:text="${ticketError}"></p>

    <p>Enter warranty information below.</p>
    <form th:action="@{|/warranties/${warranty.id}/tickets|}" method="post" th:object="${ticketForm}">
        <div style="margin-bottom: 8px;">
            <label>Issue type</label><br>
            <input type="text" th:field="*{issueType}" placeholder="e.g. Device not cooling" style="width: 100%; max-width: 420px;" required>
        </div>
        <div style="margin-bottom: 8px;">
            <label>Description</label><br>
            <textarea th:field="*{description}" rows="5" style="width: 100%; max-width: 420px;" placeholder="Describe the problem (at least 10 characters)" required minlength="10"></textarea>
        </div>
        <button type="submit">Submit request</button>
    </form>
</div>
</body>
</html>
