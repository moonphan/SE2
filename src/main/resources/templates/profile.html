<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My profile</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 680px; margin: 24px auto;">
<h2>My profile</h2>
<p>
    <a href="/products">Products</a> |
    <a href="/auth/profile/edit">Edit</a> |
    <a href="/auth/delete-account">Delete account</a>
</p>

<p th:if="${successMessage}" th:text="${successMessage}" style="color: green;"></p>

<div style="border: 1px solid #ddd; padding: 12px; margin-top: 12px;">
    <p><strong>Username:</strong> <span th:text="${username}"></span></p>
    <p><strong>Email:</strong> <span th:text="${email}"></span></p>
    <p><strong>Full name:</strong> <span th:text="${fullName}"></span></p>
    <p><strong>Phone:</strong> <span th:text="${phoneNumber}"></span></p>
    <p><strong>Address:</strong> <span th:text="${address} ?: '-'"></span></p>
</div>
</body>
</html>
